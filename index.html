<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茅ヶ崎ヘッドランド 気象情報(試作版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.5rem;
            color: #0056b3;
            text-align: center;
            margin-bottom: 20px;
        }
        .weather-box {
            background: #e9f2ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .weather-box h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 10px;
            color: #004494;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: center;
            color: #777;
        }
        .footer a {
            color: #0056b3;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            color: #666;
        }
        .error {
            color: #d9534f;
            text-align: center;
        }
        .current-time {
            text-align: center;
            margin-bottom: 15px;
            color: #555;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
    <!-- Chart.jsのライブラリを読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>🏖 茅ヶ崎ヘッドランド コンディション</h1>
    
    <div id="current-time" class="current-time"></div>
    
    <div id="loading" class="loading">最新のデータを取得中...</div>
    <div id="error" class="error" style="display: none;">データの取得に失敗しました。</div>

    <div id="weather-content" style="display: none;">
        <div class="weather-box">
            <h2>現在の天気</h2>
            <div class="data-row"><span>気温:</span> <span id="temp">-- ℃</span></div>
            <div class="data-row"><span>風速:</span> <span id="wind">-- m/s</span></div>
            <div class="data-row"><span>風向:</span> <span id="wind-dir">-- °</span></div>
        </div>

        <div class="weather-box">
            <h2>海面コンディション (予測)</h2>
            <div class="data-row"><span>波の高さ:</span> <span id="wave-height">-- m</span></div>
            <div class="data-row"><span>海水温:</span> <span id="sea-temp">-- ℃</span></div>
            <p style="font-size: 0.85rem; color: #666; margin-top: 5px;">※波と海水温のデータは沖合の予測値ベースです。</p>
        </div>

        <div class="weather-box">
            <h2>潮汐情報</h2>
            <div class="data-row"><span>潮回り:</span> <span id="tide-type">--</span></div>
            <div id="tide-extremes-container">
                <div class="data-row"><span>満潮・干潮:</span> <span id="tide-status">読み込み中...</span></div>
            </div>
            
            <!-- タイドグラフ表示用コンテナ -->
            <div id="tide-chart-container" style="display: none; margin-top: 20px; height: 160px;">
                <canvas id="tideChart"></canvas>
            </div>
            
            <p style="font-size: 0.85rem; color: #666; margin-top: 10px;">※正確な潮位は<a href="https://www.data.jma.go.jp/gmd/kaiyou/db/tide/suisan/suisan.php?stn=EN" target="_blank">気象庁の潮位表（江の島）</a>等をご確認ください。</p>
        </div>
    </div>
    
    <div class="footer">
        データ提供元: 
        <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a> / 
        <a href="https://stormglass.io/" target="_blank">Stormglass</a><br>
        ※本アプリは参考用です。実際の活動時は必ず目視や公式発表も併せて確認してください。
    </div>
</div>

<script>
    // 茅ヶ崎ヘッドランド付近の緯度経度
    const LAT = 35.318;
    const LON = 139.410;

    // データ取得時点の日付と時刻を表示する関数
    function displayFetchTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', month: 'short', day: 'numeric', weekday: 'short', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        document.getElementById('current-time').textContent = "データ取得日時: " + now.toLocaleString('ja-JP', options);
    }

    // 天気と風のデータを取得 (Open-Meteo API)
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&windspeed_unit=ms`;
    
    // 海洋データ（波、海水温）を取得 (Open-Meteo Marine API)
    const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}&current=wave_height,sea_surface_temperature`;

    // 風向の角度を16方位の日本語に変換する関数
    function getWindDirection16(degree) {
        const directions = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東", "南", "南南西", "南西", "西南西", "西", "西北西", "北西", "北北西"];
        // 角度を22.5度で割って四捨五入し、16方位のインデックスに変換
        const index = Math.round(degree / 22.5) % 16;
        return directions[index];
    }

    // 簡易的な月齢計算と潮回り判定
    function calculateTide() {
        const now = new Date();
        // 2000年1月6日からの経過日数で月齢を概算
        const epoch = new Date(Date.UTC(2000, 0, 6, 18, 14, 0)).getTime();
        const diffDays = (now.getTime() - epoch) / (1000 * 60 * 60 * 24);
        let age = diffDays % 29.530588853;
        if (age < 0) age += 29.530588853;

        const MathRoundAge = Math.round(age) % 30;
        let tideType = "若潮"; // デフォルト
        
        if (MathRoundAge <= 2 || MathRoundAge >= 28 || (MathRoundAge >= 13 && MathRoundAge <= 17)) {
            tideType = "大潮";
        } else if ((MathRoundAge >= 3 && MathRoundAge <= 6) || (MathRoundAge >= 10 && MathRoundAge <= 12) || (MathRoundAge >= 18 && MathRoundAge <= 21) || (MathRoundAge >= 25 && MathRoundAge <= 27)) {
            tideType = "中潮";
        } else if (MathRoundAge === 7 || MathRoundAge === 8 || MathRoundAge === 22 || MathRoundAge === 23) {
            tideType = "小潮";
        } else if (MathRoundAge === 9 || MathRoundAge === 24) {
            tideType = "長潮";
        }

        document.getElementById('tide-type').textContent = `${tideType} (月齢: ${age.toFixed(1)})`;
    }

    // プレビュー用のダミー潮汐データを生成する関数
    function getDummyTideExtremes() {
        const now = new Date();
        now.setHours(0, 0, 0, 0); // 今日の0時基準
        return [
            { time: new Date(now.getTime() + 5 * 3600000).toISOString(), type: 'high', height: 1.4 },
            { time: new Date(now.getTime() + 11 * 3600000).toISOString(), type: 'low', height: 0.3 },
            { time: new Date(now.getTime() + 17 * 3600000).toISOString(), type: 'high', height: 1.5 },
            { time: new Date(now.getTime() + 23 * 3600000).toISOString(), type: 'low', height: 0.4 }
        ];
    }

    // GitHub Actionsで自動生成されたJSONから満潮・干潮時間を取得する関数
    async function fetchTideExtremes() {
        const tideStatusEl = document.getElementById('tide-status');
        
        try {
            // プレビュー環境（blob:やfile:など）では相対URLのfetchがエラーになるためスキップする
            if (!window.location.protocol.startsWith('http')) {
                throw new Error("プレビュー環境またはローカル環境のため、tide_data.jsonの読み込みをスキップします。");
            }

            // キャッシュ（古いデータ）を読み込まないよう、URLの末尾に現在の時間を付与して回避
            const response = await fetch(`tide_data.json?t=${new Date().getTime()}`);

            if (!response.ok) {
                // 初回実行時などでJSONファイルがまだ存在しない場合
                throw new Error("潮汐データの読み込みに失敗しました");
            }

            const data = await response.json();
            
            // データを表示
            displayTideData(data.data);

        } catch (error) {
            console.warn(error.message); // エラーで画面を止めないよう警告レベルに変更
            
            // プレビュー環境でもグラフを確認できるようにダミーデータで描画
            const dummyData = getDummyTideExtremes();
            displayTideData(dummyData);
            
            // ダミーデータであることを明記
            const container = document.getElementById('tide-extremes-container');
            const note = document.createElement('div');
            note.style.fontSize = '0.8rem';
            note.style.color = '#d9534f';
            note.style.textAlign = 'right';
            note.style.marginTop = '5px';
            note.textContent = '※プレビュー環境のためダミー波形を表示しています';
            container.appendChild(note);
        }
    }

    let tideChartInstance = null; // グラフのインスタンス

    // 潮汐データをHTMLに表示し、グラフを描画する関数
    function displayTideData(extremes) {
        const container = document.getElementById('tide-extremes-container');
        container.innerHTML = ''; // 中身をクリア

        if (!extremes || extremes.length === 0) {
            container.innerHTML = '<div class="data-row"><span>満潮・干潮:</span> <span>データなし</span></div>';
            return;
        }

        const chartDataPoints = [];
        let hasHeightData = false;

        extremes.forEach(item => {
            // Stormglassの時間はUTCなので、日本時間に変換
            const dateObj = new Date(item.time);
            const timeStr = dateObj.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            
            const typeStr = item.type === 'high' ? '満潮' : '干潮';
            const color = item.type === 'high' ? '#d9534f' : '#0275d8'; // 満潮は赤系、干潮は青系

            // 高さデータがあれば取得
            let heightValue = item.type === 'high' ? 1 : 0;
            let heightText = '';
            if (item.height !== undefined && item.height !== null) {
                hasHeightData = true;
                heightValue = parseFloat(item.height);
                heightText = ` (${heightValue.toFixed(1)}m)`;
            }

            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `<span>${typeStr}:</span> <span style="color: ${color}; font-weight: bold;">${timeStr}${heightText}</span>`;
            container.appendChild(row);

            // グラフ用にデータを格納
            chartDataPoints.push({
                timeMs: dateObj.getTime(),
                timeStr: timeStr,
                type: item.type,
                height: heightValue
            });
        });

        // グラフを描画
        drawTideChart(chartDataPoints, hasHeightData);
    }

    // Chart.jsを用いてタイドグラフを描画する関数
    function drawTideChart(extremes, hasHeightData) {
        const chartContainer = document.getElementById('tide-chart-container');
        chartContainer.style.display = 'block';

        const ctx = document.getElementById('tideChart').getContext('2d');
        
        // 時間順にソート
        extremes.sort((a, b) => a.timeMs - b.timeMs);

        const labels = [];
        const dataPoints = [];
        const pointRadii = [];
        const pointColors = [];

        // コサイン曲線を用いて、極値（満潮・干潮）の間を滑らかに補間する
        if (extremes.length >= 2) {
            const step = 30 * 60 * 1000; // 30分刻みで補間
            for (let i = 0; i < extremes.length - 1; i++) {
                const pt1 = extremes[i];
                const pt2 = extremes[i + 1];

                // 実際の極値ポイント
                labels.push(pt1.timeStr);
                dataPoints.push(pt1.height);
                pointRadii.push(5); // 実データは点を大きく
                pointColors.push(pt1.type === 'high' ? '#d9534f' : '#0275d8');

                // pt1 と pt2 の間をコサイン曲線で埋める
                for (let t = pt1.timeMs + step; t < pt2.timeMs; t += step) {
                    const normalizedT = (t - pt1.timeMs) / (pt2.timeMs - pt1.timeMs);
                    // (1 - cos(π * t)) / 2 で 0〜1 の滑らかなS字曲線を作る
                    const cosVal = (1 - Math.cos(Math.PI * normalizedT)) / 2;
                    const h = pt1.height + (pt2.height - pt1.height) * cosVal;

                    const dateObj = new Date(t);
                    labels.push(dateObj.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
                    dataPoints.push(h);
                    pointRadii.push(0); // 補間点はマーカーを隠す
                    pointColors.push('#0056b3');
                }
            }
            // 最後の極値ポイント
            const lastPt = extremes[extremes.length - 1];
            labels.push(lastPt.timeStr);
            dataPoints.push(lastPt.height);
            pointRadii.push(5);
            pointColors.push(lastPt.type === 'high' ? '#d9534f' : '#0275d8');
        }

        // 以前のグラフがあれば破棄して再描画
        if (tideChartInstance) {
            tideChartInstance.destroy();
        }

        tideChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: hasHeightData ? '潮位 (m)' : '潮位イメージ',
                    data: dataPoints,
                    borderColor: '#0056b3',
                    backgroundColor: 'rgba(0, 86, 179, 0.15)',
                    borderWidth: 2,
                    pointBackgroundColor: pointColors,
                    pointBorderColor: '#fff',
                    pointRadius: pointRadii,
                    pointHoverRadius: 7,
                    fill: true,
                    tension: 0.4 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return hasHeightData ? context.parsed.y.toFixed(2) + ' m' : '潮位イメージ';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        display: hasHeightData,
                        suggestedMin: hasHeightData ? Math.min(...dataPoints) - 0.2 : -0.2,
                        suggestedMax: hasHeightData ? Math.max(...dataPoints) + 0.2 : 1.2,
                        ticks: {
                            callback: function(value) { return value.toFixed(1) + ' m'; }
                        }
                    },
                    x: {
                        ticks: {
                            maxTicksLimit: 6, // X軸の時刻ラベルが重ならないように間引く
                            maxRotation: 0
                        },
                        grid: { display: false }
                    }
                }
            }
        });
    }

    async function fetchWeatherData() {
        try {
            // 潮回りの計算を実行
            calculateTide();
            
            // 潮汐データ（満潮・干潮）の取得を実行
            fetchTideExtremes();

            // 2つのAPIを同時に呼び出す
            const [weatherRes, marineRes] = await Promise.all([
                fetch(weatherUrl),
                fetch(marineUrl)
            ]);

            if (!weatherRes.ok || !marineRes.ok) throw new Error("API Network response was not ok");

            const weatherData = await weatherRes.json();
            const marineData = await marineRes.json();

            // 画面の要素にデータをセット
            document.getElementById('temp').textContent = `${weatherData.current_weather.temperature} ℃`;
            document.getElementById('wind').textContent = `${weatherData.current_weather.windspeed} m/s`;
            
            const windDirDegree = weatherData.current_weather.winddirection;
            document.getElementById('wind-dir').textContent = getWindDirection16(windDirDegree);
            
            // 波の高さ（取得できた場合）
            if (marineData.current && marineData.current.wave_height !== null && marineData.current.wave_height !== undefined) {
                document.getElementById('wave-height').textContent = `${marineData.current.wave_height} m`;
            } else {
                document.getElementById('wave-height').textContent = "データなし";
            }

            // 海水温（取得できた場合）
            if (marineData.current && marineData.current.sea_surface_temperature !== null && marineData.current.sea_surface_temperature !== undefined) {
                document.getElementById('sea-temp').textContent = `${marineData.current.sea_surface_temperature} ℃`;
            } else {
                document.getElementById('sea-temp').textContent = "データなし";
            }

            // ローディングを消してコンテンツを表示
            document.getElementById('loading').style.display = 'none';
            document.getElementById('weather-content').style.display = 'block';

            // 取得完了時の時刻を表示
            displayFetchTime();

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
    }

    // ページ読み込み時に実行
    window.onload = fetchWeatherData;
</script>

</body>
</html>
